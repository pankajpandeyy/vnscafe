<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varanasi Cafe & Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
color:#fff;
}

header{
position:fixed;
width:100%;
top:0;
left:0;
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

header h1{
font-family:'Playfair Display',serif;
font-size:24px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:#fff;
font-size:14px;
}

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb') no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
width:100%;
height:100vh;
background:rgba(0,0,0,0.6);
top:0;
left:0;
}

.hero-content{
position:relative;
z-index:2;
}

.hero h2{
font-size:50px;
font-family:'Playfair Display',serif;
}

.hero p{
margin:20px 0;
font-size:18px;
}

.btn{
padding:12px 25px;
background:#c59d5f;
border:none;
color:#000;
cursor:pointer;
border-radius:30px;
}

section{
padding:80px 50px;
text-align:center;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
}

footer{
padding:40px;
background:#000;
text-align:center;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
text-decoration:none;
color:#fff;
font-weight:bold;
}

.call{
position:fixed;
bottom:80px;
right:20px;
background:#c59d5f;
padding:15px;
border-radius:50%;
text-decoration:none;
color:#000;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Varanasi Cafe</h1>
<nav>
<a href="#">Home</a>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h2>Premium Cafe Moments</h2>
<p>Crafted with love in the heart of Varanasi</p>
<button class="btn">View Menu</button>
</div>
</section>

<section id="menu">
<h2>Our Menu</h2>
<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
<h3>Cappuccino - ₹150</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
<h3>Veg Pasta - ₹250</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>Burger Meal - ₹200</h3>
</div>

</div>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
<img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
</div>
</section>

<section id="contact">
<h2>Contact Us</h2>
<p>📍 Varanasi, India</p>
<p>📞 +91 9876543210</p>
</section>

<footer>
<p>© 2026 Varanasi Cafe & Restaurant</p>
</footer>

<a href="https://wa.me/919876543210" class="whatsapp">W</a>
<a href="tel:9876543210" class="call">C</a>

</body>
</html>
