<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzeria Vaatika</title>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;}

header{padding:20px;background:#000;text-align:center;font-size:22px;}

.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;}

.card{
background:#1c1c1c;border-radius:10px;padding:10px;text-align:center;
}

.card img{width:100%;height:150px;object-fit:cover;border-radius:10px;}

button{
background:#ffb703;border:none;padding:8px 15px;margin-top:10px;cursor:pointer;
}

.veg{color:lightgreen;font-weight:bold;}
.nonveg{color:red;font-weight:bold;}

.cart{
position:fixed;right:0;top:0;width:300px;height:100%;
background:#222;padding:20px;overflow:auto;
}

.cart-item{
display:flex;justify-content:space-between;margin:10px 0;
}

.qty button{padding:2px 6px;}
</style>
</head>

<body>

<header>Pizzeria Vaatika - Order Now</header>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1548365328-9f547fb0953c">
<p class="veg">🟢 Veg</p>
<h3>Farmhouse Pizza - ₹299</h3>
<button onclick="addToCart('Farmhouse Pizza',299)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1514517220031-7e3c4c0d0f39">
<p class="nonveg">🔴 Non-Veg</p>
<h3>Chicken Pizza - ₹349</h3>
<button onclick="addToCart('Chicken Pizza',349)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1525755662778-989d0524087e">
<p class="veg">🟢 Veg</p>
<h3>Pasta - ₹249</h3>
<button onclick="addToCart('Pasta',249)">Add</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3 id="total">Total: ₹0</h3>

<button onclick="checkout()">Proceed to Order</button>
</div>

<script>
let cart=[];

function addToCart(name,price){
let item=cart.find(i=>i.name===name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

renderCart();
alert(name+" added to cart");
}

function renderCart(){
let html="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price*item.qty;

html+=`
<div class="cart-item">
<div>
${item.name} x ${item.qty}
</div>

<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
<button onclick="changeQty(${index},1)">+</button>
<button onclick="removeItem(${index})">❌</button>
</div>
</div>
`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
}

function changeQty(index,change){
cart[index].qty+=change;

if(cart[index].qty<=0){
cart.splice(index,1);
}

renderCart();
}

function removeItem(index){
cart.splice(index,1);
renderCart();
}

function checkout(){
if(cart.length===0){
alert("Cart is empty");
return;
}

let msg="Hello, I want to order:\n";

cart.forEach(item=>{
msg+=`${item.name} x ${item.qty}\n`;
});

window.open(`https://wa.me/919876543210?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
